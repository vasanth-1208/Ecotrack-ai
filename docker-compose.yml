version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecotrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securePassword987
      POSTGRES_DB: ecotrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecotrack-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:securePassword987@db:5432/ecotrack
      JWT_SECRET: docker-compose-super-secret-key-999
      GEMINI_API_KEY: "" # Users can configure their Gemini API Key here
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecotrack-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
